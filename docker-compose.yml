# ── Moonshadows — Docker Swarm + Traefik ─────────────────────
#  Stack name: moonshadows  ·  Domain: ${DOMAIN:-moonshadowspro.com}
#  Network:    RenaceNet (external overlay, see renace-deploy skill)
#  Entrypoints: web (:80), websecure (:443)
#  Cert resolver: letsencryptresolver

services:
  web:
    image: moonshadows-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M
      labels:
        # Traefik base
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        # ── HTTP → HTTPS redirect ───────────────────────────────
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-http.rule=Host(`${DOMAIN:-moonshadowspro.com}`) || Host(`www.${DOMAIN:-moonshadowspro.com}`)
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-http.entrypoints=web
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-http.middlewares=moonshadows-${STACK_NAME:-prod}-redirect-https

        # ── HTTPS canonical (apex) ──────────────────────────────
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.rule=Host(`${DOMAIN:-moonshadowspro.com}`)
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.entrypoints=websecure
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.tls=true
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.tls.certresolver=letsencryptresolver
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.service=moonshadows-${STACK_NAME:-prod}-svc
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}.middlewares=moonshadows-${STACK_NAME:-prod}-security

        # ── HTTPS www → apex redirect ───────────────────────────
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.rule=Host(`www.${DOMAIN:-moonshadowspro.com}`)
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.entrypoints=websecure
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.tls=true
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.tls.certresolver=letsencryptresolver
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.middlewares=moonshadows-${STACK_NAME:-prod}-www-redirect
        - traefik.http.routers.moonshadows-${STACK_NAME:-prod}-www.service=moonshadows-${STACK_NAME:-prod}-svc

        # ── Service ─────────────────────────────────────────────
        - traefik.http.services.moonshadows-${STACK_NAME:-prod}-svc.loadbalancer.server.port=80
        - traefik.http.services.moonshadows-${STACK_NAME:-prod}-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.moonshadows-${STACK_NAME:-prod}-svc.loadbalancer.healthcheck.interval=30s

        # ── Middlewares ─────────────────────────────────────────
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-www-redirect.redirectregex.regex=^https?://www\.(.+)$$
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-www-redirect.redirectregex.replacement=https://$$1
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-www-redirect.redirectregex.permanent=true

        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.stsPreload=true
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.browserXssFilter=true
        - traefik.http.middlewares.moonshadows-${STACK_NAME:-prod}-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  RenaceNet:
    external: true
