# ── Moonshadows — nginx server block ─────────────────────────
#  Static one-pager. Long-cached assets, no-cache html, gzip+brotli.

map $sent_http_content_type $expires_static {
    default                    off;
    text/css                   max;
    application/javascript     max;
    image/svg+xml              max;
    image/png                  max;
    image/jpeg                 max;
    image/webp                 max;
    font/woff2                 max;
}

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Performance / safety
    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Compression
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml font/woff2;

    # Security headers (Traefik may also inject, these are safe defaults)
    add_header X-Content-Type-Options  "nosniff"             always;
    add_header X-Frame-Options         "SAMEORIGIN"          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Health
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # robots / sitemap fallbacks
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://moonshadowspro.com/sitemap.xml\n";
    }

    # Cache long for static assets (hashed in /assets/)
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2|ico)$ {
        expires     $expires_static;
        access_log  off;
        add_header  Cache-Control "public, max-age=31536000, immutable" always;
        try_files   $uri =404;
    }

    # Never cache the html shell
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # SPA-style fallback (works for one-pager too)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
